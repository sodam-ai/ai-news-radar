name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# V14.2.1 — 최소권한: 읽기 전용 (쓰기 작업은 crawl.yml이 별도 담당)
permissions:
  contents: read

jobs:
  test:
    name: pytest + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=utils --cov=db --cov=crawler --cov=ai.knowledge_graph \
            --cov-report=term --cov-report=xml --cov-fail-under=50 -v

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 7

  security-audit:
    name: pip-audit + detect-secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit detect-secrets

      - name: pip-audit (CVE scan)
        run: |
          pip-audit --strict -r requirements.txt

      - name: detect-secrets scan
        run: |
          if [ -f .secrets.baseline ]; then
            detect-secrets scan --baseline .secrets.baseline
          else
            detect-secrets scan
          fi
